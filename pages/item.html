<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Item Manage</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/css/main-page.css" />
    <link rel="icon" href="/assets/logo/sr-icon.png" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <header
      class="shadow-lg p-3 mb-5 bg-body rounded position-fixed top-0 w-100"
      style="z-index: 20"
    >
      <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
          <img class="logo" src="/assets/logo/sr-logo.png" alt="SR-logo" />
          <h3 class="mb-0">Pos System</h3>
          <button
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
            class="navbar-toggler"
            data-bs-target="#navbarSupportedContent"
            data-bs-toggle="collapse"
            type="button"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="i_navBar">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0 mx-4">
              <li class="nav-item">
                <a aria-current="page" class="nav-link" href="/index.html"
                  >Home</a
                >
              </li>
              <li class="nav-item">
                <a aria-current="page" class="nav-link" href="/pages/place-order.html">Place Order</a>
              </li>
              <li class="nav-item">
                <a
                  aria-current="page"
                  class="nav-link active"
                  href="#"
                  >Items</a
                >
              </li>
              <li class="nav-item">
                <a
                  aria-current="page"
                  class="nav-link"
                  href="/pages/customer.html"
                  >Customers</a
                >
              </li>
              <li class="nav-item">
                <a aria-current="page" class="nav-link" href="/pages/order-details.html"
                  >Order Details</a
                >
              </li>
            </ul>
          </div>
          <div class="sign-logout">
            <a href="#"><i class="fa-solid fa-user-plus"></i>Sign up</a>
            <a href="#"
              ><i class="fa-solid fa-right-from-bracket"></i>Log Out</a
            >
          </div>
        </div>
      </nav>
    </header>

    <!-- Item -->
    <section class="item">
      <div
        class="container-xxl customer-sec shadow-sm p-3 mb-5 bg-body-tertiary rounded"
      >
        <div class="text-uppercase fw-bold fs-1 topic">
          <i class="fa-solid fa-boxes-stacked"></i>
          <h1>Items</h1>
        </div>

        <!-- Item Manage -->
        <div class="container-fluid">
          <div class="row row-cols-2">
            <div class="mb-3">
              <label for="formGroupExampleInput" class="form-label"
                >Item ID</label
              >
              <input
                type="text"
                class="form-control"
                id="formGroupExampleInput"
              />
            </div>
            <div class="mb-3">
              <label for="formGroupExampleInput2" class="form-label"
                >Item Name</label
              >
              <input
                type="text"
                class="form-control"
                id="formGroupExampleInput2"
              />
            </div>
            <div class="mb-3">
              <label for="formGroupExampleInput" class="form-label"
                >Quantity</label
              >
              <input
                type="text"
                class="form-control"
                id="formGroupExampleInput"
              />
            </div>
            <div class="mb-3">
              <label for="formGroupExampleInput2" class="form-label"
                >Unit Price</label
              >
              <input
                type="text"
                class="form-control"
                id="formGroupExampleInput2"
              />
            </div>
          </div>

          <button type="button" class="btn btn-primary">Save</button>
          <button type="button" class="btn btn-secondary">Clear</button>
          <button type="button" class="btn btn-success">Update</button>
          <button type="button" class="btn btn-danger">Delete</button>
        </div>

        <div class="row w-100">
          <div class="col-6 col-md-6 text-center py-2 mt-4" id="sub-btn">
            <button class="btn w-100 h-80 btn-light">
              <i class="fa-solid fa-plus"></i>
              New Item
            </button>
          </div>
          <div class="col-6 col-md-6 text-center py-2 mt-4" id="sub-btn">
            <button class="btn w-100 h-80 btn-light">
              <i class="fa-solid fa-clipboard-list"></i>
              View All Items
            </button>
          </div>
        </div>

        <div class="row justify-content-center mb-5">
          <div class="col-10 mt-5">
            <label for="">Find Item:</label>
          </div>
          <form role="search" class="d-flex justify-content-center mt-3 gap-3">
            <div class="col-7 col-md-8">
              <input
                type="search"
                placeholder="search"
                aria-label="search"
                class="form-control me-2"
              />
            </div>

            <div class="col-3 col-md-2">
              <button class="btn btn-outline-success w-100">Search</button>
            </div>
          </form>
        </div>

        <!-- Table Customer -->
        <table
          class="table table-hover m-auto w-90 mt-5 table-responsive table-bordered"
        >
          <thead class="cus-table">
            <tr>
              <th>Item ID</th>
              <th>Item Name</th>
              <th>Quantity</th>
              <th>Unit Price</th>
            </tr>
          </thead>
          <tbody class="table-secondary" id="c-tb">
            <tr>
              <td>I-001</td>
              <td>Denims</td>
              <td>90</td>
              <td>3800.00</td>
            </tr>
            <tr>
              <td>I-002</td>
              <td>Polo T-shirt</td>
              <td>70</td>
              <td>2600.00</td>
            </tr>
            <tr>
              <td>I-003</td>
              <td>Frocks</td>
              <td>85</td>
              <td>2400.00</td>
            </tr>
            <tr>
              <td>I-004</td>
              <td>Blowse</td>
              <td>50</td>
              <td>1800.00</td>
            </tr>
            <tr>
              <td>I-005</td>
              <td>Shoes</td>
              <td>40</td>
              <td>8500.00</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </body>
</html>
