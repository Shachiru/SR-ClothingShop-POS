<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order Details Manage</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/css/main-page.css" />
    <link rel="icon" href="/assets/logo/sr-icon.png" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <header
      class="shadow-lg p-3 mb-5 bg-body rounded position-fixed top-0 w-100"
      style="z-index: 20"
    >
      <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
          <img class="logo" src="/assets/logo/sr-logo.png" alt="SR-logo" />
          <h3 class="mb-0">Pos System</h3>
          <button
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
            class="navbar-toggler"
            data-bs-target="#navbarSupportedContent"
            data-bs-toggle="collapse"
            type="button"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="i_navBar">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0 mx-4">
              <li class="nav-item">
                <a aria-current="page" class="nav-link" href="/index.html"
                  >Home</a
                >
              </li>
              <li class="nav-item">
                <a aria-current="page" class="nav-link" href="/pages/place-order.html">Place Order</a>
              </li>
              <li class="nav-item">
                <a aria-current="page" class="nav-link" href="/pages/item.html"
                  >Items</a
                >
              </li>
              <li class="nav-item">
                <a
                  aria-current="page"
                  class="nav-link"
                  href="/pages/customer.html"
                  >Customers</a
                >
              </li>
              <li class="nav-item">
                <a aria-current="page" class="nav-link active" href="#"
                  >Order Details</a
                >
              </li>
            </ul>
          </div>
          <div class="sign-logout">
            <a href="#"><i class="fa-solid fa-user-plus"></i>Sign up</a>
            <a href="#"
              ><i class="fa-solid fa-right-from-bracket"></i>Log Out</a
            >
          </div>
        </div>
      </nav>
    </header>

    <section class="order-details">
      <div
        class="container border rounded-5 border-success bg-secondary-subtle"
        style="margin-top: 100px"
      >
        <div class="row justify-content-center mb-5">
          <div class="col-10 mt-5">
            <label class=" ">Find the Order:</label>
          </div>
          <form class="d-flex justify-content-center mt-3 gap-3" role="search">
            <div class="col-7 col-md-8">
              <input
                aria-label="Search"
                class="form-control me-2"
                placeholder="Enter Order ID"
                id="od_inputOrderId"
              />
            </div>
            <div class="col-3 col-md-2">
              <button
                class="btn btn-outline-success w-100"
                id="od_btnGetDetails"
              >
                Get Details
              </button>
            </div>
          </form>
        </div>
      </div>
    </section>
  </body>
</html>
