<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Place Order Manage</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="/css/main-page.css" />
    <link rel="icon" href="/assets/logo/sr-icon.png" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <header
      class="shadow-lg p-3 mb-5 bg-body rounded position-fixed top-0 w-100"
      style="z-index: 20"
    >
      <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
          <img class="logo" src="/assets/logo/sr-logo.png" alt="SR-logo" />
          <h3 class="mb-0">Pos System</h3>
          <button
            aria-controls="navbarSupportedContent"
            aria-expanded="false"
            aria-label="Toggle navigation"
            class="navbar-toggler"
            data-bs-target="#navbarSupportedContent"
            data-bs-toggle="collapse"
            type="button"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="i_navBar">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0 mx-4">
              <li class="nav-item">
                <a aria-current="page" class="nav-link" href="/index.html"
                  >Home</a
                >
              </li>
              <li class="nav-item">
                <a aria-current="page" class="nav-link active" href="#"
                  >Place Order</a
                >
              </li>
              <li class="nav-item">
                <a aria-current="page" class="nav-link" href="/pages/item.html"
                  >Items</a
                >
              </li>
              <li class="nav-item">
                <a
                  aria-current="page"
                  class="nav-link"
                  href="/pages/customer.html"
                  >Customers</a
                >
              </li>
              <li class="nav-item">
                <a
                  aria-current="page"
                  class="nav-link"
                  href="/pages/order-details.html"
                  >Order Details</a
                >
              </li>
            </ul>
          </div>
          <div class="sign-logout">
            <a href="#"><i class="fa-solid fa-user-plus"></i>Sign up</a>
            <a href="#"
              ><i class="fa-solid fa-right-from-bracket"></i>Log Out</a
            >
          </div>
        </div>
      </nav>
    </header>

    <section class="place-order">
      <div
        class="container border rounded-5 mb-5 py-4 border-3 bg-secondary-subtle"
      >
        <div class="row justify-content-center w-100 mx-auto">
          <div class="col-10 col-sm-5 col-md-3 mb-3 mt-3 mb-md-0">
            <label class="form-label" for="o_inputOrderId">Order ID:</label>
            <input
              class="form-control border-black"
              id="o_inputOrderId"
              placeholder=""
              type="text"
              disabled
            />
          </div>
          <div class="col-10 col-sm-5 col-md-3 mb-3 mt-3 mb-md-0">
            <label class="form-label" for="o_inputOrderDate">Order Date:</label>
            <input
              class="form-control border-black"
              id="o_inputOrderDate"
              placeholder=""
              type="date"
            />
          </div>
          <div class="col-10 col-md-3 mb-0 mt-3">
            <label class="form-label" for="o_inputCustId">Customer ID:</label>
            <select
              class="form-select border-black"
              id="o_inputCustId"
            ></select>
          </div>
          <div class="col-10 col-md-9 mb-0 mt-3">
            <label class="form-label text-info-emphasis">Customer Name:</label>
            <label
              class="form-label text-info-emphasis"
              id="o_lblCustName"
            ></label>
          </div>
          <div class="col-10 col-md-9 mb-0 mt-0">
            <label class="form-label text-info-emphasis"
              >Customer Contact:</label
            >
            <label
              class="form-label text-info-emphasis"
              id="o_lblCustContact"
            ></label>
          </div>
          <div class="col-10 col-md-9 mb-0 mt-3">
            <label class="form-label" for="o_inputItmCode">Item Code:</label>
            <select
              class="form-select border-black"
              id="o_inputItmCode"
            ></select>
          </div>
          <div class="col-10 col-md-6 mb-0 mt-3">
            <label class="form-label text-info-emphasis">Item Name:</label>
            <label
              class="form-label text-info-emphasis"
              id="o_lblItmName"
            ></label>
          </div>
          <div class="col-10 col-md-3 col-sm-5 mb-0 mt-0 mt-md-3">
            <label class="form-label text-info-emphasis">Unit Price:</label>
            <label
              class="form-label text-info-emphasis"
              id="o_lblItmUnitPrice"
            ></label>
          </div>
          <div class="col-10 col-md-9 col-sm-5 mb-0 mt-0">
            <label class="form-label text-info-emphasis">Qty left:</label>
            <label
              class="form-label text-info-emphasis"
              id="o_lblItmQtyLeft"
            ></label>
          </div>
          <div class="col-10 col-md-9 mb-2 mt-3">
            <label class="form-label" for="o_inputOrdQty">Ordered Qty:</label>
            <input
              class="form-control border-black"
              id="o_inputOrdQty"
              min="1"
              placeholder=""
              type="number"
              style="width: 35%"
            />
          </div>
          <div class="col-10 col-md-9 mb-0 mt-3">
            <button
              class="btn w-100 h-100 text-white"
              id="btnAddToCart"
            >
              Add To Cart
            </button>
          </div>
          <div class="col-10 col-md-9 mb-0 mt-3 overflow-x-scroll">
            <table
              class="table table-responsive table-hover mt-4 mb-4 table-bordered w-100"
              id="tblOrder"
            >
              <thead>
                <tr class="table-dark">
                  <th>Item Code</th>
                  <th>Item Name</th>
                  <th>Unit Price</th>
                  <th>Quantity</th>
                  <th>Total</th>
                </tr>
              </thead>
              <tbody class="table-light" id="o_tBody"></tbody>
            </table>
          </div>
          <div class="col-10 col-md-9 mb-0 mt-5">
            <label class="form-label fs-1 text-primary">Total:</label>
            <label class="form-label fs-1 text-primary-emphasis" id="o_lblTotal"></label>
          </div>
          <div class="col-10 col-md-9 mb-3 mt-0">
            <label class="form-label fs-4 text-secondary">Sub Total:</label>
            <label
              class="form-label fs-4 text-secondary"
              id="o_lblSubTotal"
            ></label>
          </div>
          <div class="col-10 col-md-9 mb-0 mt-0">
            <label class="form-label" for="o_inputDiscount"
              >Discount (%):</label
            >
            <input
              class="form-control w-25 border-black"
              id="o_inputDiscount"
              min="0"
              max="100"
              placeholder=""
              type="number"
            />
          </div>
          <div class="col-10 col-md-9 mb-0 mt-4">
            <label class="form-label" for="o_inputCash">Cash:</label>
            <input
              class="form-control w-25 border-black"
              id="o_inputCash"
              min="0"
              max="100"
              placeholder=""
              type="text"
            />
          </div>
          <div class="col-10 col-md-9 mb-0 mt-4">
            <label class="form-label" for="o_inputBalance">Balance:</label>
            <input
              class="form-control w-25 border-black"
              id="o_inputBalance"
              min="0"
              max="100"
              placeholder=""
              type="text"
              disabled
            />
          </div>
        </div>
        <div class="row w-100 mb-5 mt-5 justify-content-center mx-auto">
          <div class="col-10 col-md-9 text-center py-2">
            <button
              class="btn w-100 h-100 bg-success text-white"
              id="o_btnPurchase"
            >
              Purchase
            </button>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
